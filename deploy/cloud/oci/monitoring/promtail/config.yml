server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: coinpilot-file-targets
    static_configs:
      - targets: [localhost]
        labels:
          __path__: /targets/logs/*.log

    # Docker json-file 로그를 구조화해 message/timestamp/stream 분리를 안정화한다.
    pipeline_stages:
      - docker: {}

    relabel_configs:
      # symlink 파일명(coinpilot-*.log)에서 서비스명을 추출한다.
      - source_labels: [__path__]
        regex: '.*/(coinpilot-[^/]+)\\.log'
        target_label: service

      - source_labels: [service]
        target_label: container

      # service 라벨이 비어 있으면 운영 의미가 없는 시계열이므로 드롭한다.
      - source_labels: [service]
        regex: ''
        action: drop
