server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: coinpilot-file-targets
    static_configs:
      - targets: [localhost]
        labels:
          __path__: /targets/logs/*.log

    # Docker json-file 로그를 구조화해 message/timestamp/stream 분리를 안정화한다.
    pipeline_stages:
      - docker: {}
      # static __path__는 glob 패턴이라 relabel에서 서비스명 추출이 실패할 수 있다.
      # 파일 타깃 수집 시 promtail이 자동 부여하는 filename 라벨에서 service/container를 추출한다.
      - regex:
          source: filename
          expression: '.*/(?P<service>coinpilot-[^/]+)\\.log'
      - labels:
          service:
      - template:
          source: container
          template: '{{ .service }}'
      - labels:
          container:
