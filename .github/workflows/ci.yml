name: CoinPilot CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libopenblas-dev liblapack-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --only-binary=scipy -r requirements.txt
        
    - name: Run Unit Tests
      env:
        REDIS_URL: redis://localhost:6379/0
        # src/common/db.py는 import 시점에 DB_PASSWORD 또는 DATABASE_URL이 없으면 fail-fast 예외를 발생시킨다.
        # CI에서는 DB 연결 자체보다 테스트 수집/로직 검증이 목적이므로 최소 환경변수를 주입한다.
        DB_PASSWORD: ci_test_password
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/coinpilot_test
        PYTHONPATH: .
      run: |
        python -m pytest tests/utils/test_metrics.py tests/analytics/ tests/agents/

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit

    - name: Initialize security report artifacts
      run: |
        # 보안 검사 단계 중간 실패 시에도 업로드 step이 경고 없이 동작하도록
        # 기본 리포트 파일을 선생성한다.
        echo "{}" > pip-audit-report-core.json
        echo "{}" > pip-audit-report-bot.json

    - name: Run Bandit (high severity/high confidence)
      run: |
        bandit -r src -ll -ii

    - name: Run pip-audit for core dependencies (fail on known vulnerabilities)
      run: |
        pip-audit -r requirements.txt \
          --progress-spinner off \
          --format json \
          --output pip-audit-report-core.json

    - name: Run pip-audit for bot dependencies (fail on known vulnerabilities)
      run: |
        # requirements.txt와 requirements-bot.txt는 런타임 대상이 달라 일부 패키지 버전이 다르다.
        # 단일 환경에 동시 설치하면 resolver 충돌이 발생할 수 있어 파일 단위로 분리 감사한다.
        pip-audit -r requirements-bot.txt \
          --progress-spinner off \
          --format json \
          --output pip-audit-report-bot.json

    - name: Upload pip-audit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pip-audit-report
        if-no-files-found: warn
        path: |
          pip-audit-report-core.json
          pip-audit-report-bot.json
