name: CoinPilot CI

on:
  push:
    branches: [ "main", "f27" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libopenblas-dev liblapack-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --only-binary=scipy -r requirements.txt
        
    - name: Run Unit Tests
      env:
        REDIS_URL: redis://localhost:6379/0
        # src/common/db.py는 import 시점에 DB_PASSWORD 또는 DATABASE_URL이 없으면 fail-fast 예외를 발생시킨다.
        # CI에서는 DB 연결 자체보다 테스트 수집/로직 검증이 목적이므로 최소 환경변수를 주입한다.
        DB_PASSWORD: ci_test_password
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/coinpilot_test
        PYTHONPATH: .
      run: |
        python -m pytest tests/utils/test_metrics.py tests/analytics/ tests/agents/

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit

    - name: Initialize security report artifacts
      run: |
        # 보안 검사 단계 중간 실패 시에도 업로드 step이 경고 없이 동작하도록
        # 기본 리포트 파일을 선생성한다.
        echo "{}" > pip-audit-report-core.json
        echo "{}" > pip-audit-report-bot.json
        # pip-audit 개별 step를 항상 0으로 종료해 annotation 노이즈를 줄이고,
        # 실제 실패 판정은 마지막 요약 step에서만 일관되게 수행한다.
        echo "99" > pip-audit-core.exitcode
        echo "99" > pip-audit-bot.exitcode

    - name: Run Bandit (high severity/high confidence)
      run: |
        bandit -r src -ll -ii

    - name: Run pip-audit for core dependencies
      run: |
        set +e
        pip-audit -r requirements.txt \
          --progress-spinner off \
          --format json \
          --output pip-audit-report-core.json
        rc=$?
        echo "${rc}" > pip-audit-core.exitcode
        exit 0

    - name: Run pip-audit for bot dependencies
      run: |
        # requirements.txt와 requirements-bot.txt는 런타임 대상이 달라 일부 패키지 버전이 다르다.
        # 단일 환경에 동시 설치하면 resolver 충돌이 발생할 수 있어 파일 단위로 분리 감사한다.
        set +e
        pip-audit -r requirements-bot.txt \
          --progress-spinner off \
          --format json \
          --output pip-audit-report-bot.json
        rc=$?
        echo "${rc}" > pip-audit-bot.exitcode
        exit 0

    - name: Summarize pip-audit results and enforce gate
      run: |
        python - <<'PY'
        import json
        import sys
        from pathlib import Path

        # 두 requirements(core/bot)를 분리 감사한 결과를 다시 한 곳에서 합쳐서
        # "어떤 패키지/버전이 어떤 ID로 걸렸는지"를 로그에 명확히 남긴다.
        # 이렇게 해야 다음 수정 사이클에서 오탐/누락 없이 바로 대응 가능하다.
        ignore_file = Path("security/pip_audit_ignored_vulns.txt")
        ignored_ids = set()
        if ignore_file.exists():
            for raw in ignore_file.read_text(encoding="utf-8").splitlines():
                line = raw.strip()
                if not line or line.startswith("#"):
                    continue
                ignored_ids.add(line)

        reports = [
            ("core", Path("pip-audit-report-core.json")),
            ("bot", Path("pip-audit-report-bot.json")),
        ]
        exitcode_files = {
            "core": Path("pip-audit-core.exitcode"),
            "bot": Path("pip-audit-bot.exitcode"),
        }
        all_issues = []
        blocking_issues = []
        ignored_issues = []
        exitcodes = {}

        for label, path in exitcode_files.items():
            if not path.exists():
                print(f"[ERROR] Missing exitcode file: {path}")
                sys.exit(2)
            raw = path.read_text(encoding="utf-8").strip()
            try:
                code = int(raw)
            except ValueError:
                print(f"[ERROR] Invalid exitcode value in {path}: {raw!r}")
                sys.exit(2)
            exitcodes[label] = code
            # pip-audit는 일반적으로 0(취약점 없음), 1(취약점 있음)을 사용한다.
            # 그 외 코드는 실행 실패로 간주한다.
            if code not in (0, 1):
                print(f"[ERROR] pip-audit runtime failure for {label} (exitcode={code})")
                sys.exit(2)

        for label, path in reports:
            if not path.exists():
                print(f"[ERROR] Missing report file: {path}")
                sys.exit(2)

            try:
                data = json.loads(path.read_text(encoding="utf-8"))
            except Exception as exc:  # noqa: BLE001
                print(f"[ERROR] Failed to parse {path}: {exc}")
                sys.exit(2)

            # pip-audit JSON 스키마가 예상과 다르면 "취약점 0건"으로 오판하면 안 되므로
            # 즉시 실패 처리하여 보안 게이트의 신뢰성을 유지한다.
            deps = data.get("dependencies", []) if isinstance(data, dict) else []
            if not isinstance(deps, list):
                print(f"[ERROR] Unexpected report schema: {path}")
                sys.exit(2)

            for dep in deps:
                name = dep.get("name", "unknown")
                version = dep.get("version", "unknown")
                vulns = dep.get("vulns", [])
                if not isinstance(vulns, list):
                    continue
                for vuln in vulns:
                    vuln_id = vuln.get("id", "UNKNOWN")
                    fixes = ",".join(vuln.get("fix_versions", [])) if isinstance(vuln.get("fix_versions"), list) else "-"
                    issue = (label, name, version, vuln_id, fixes)
                    all_issues.append(issue)
                    if vuln_id in ignored_ids:
                        ignored_issues.append(issue)
                    else:
                        blocking_issues.append(issue)

        if not all_issues:
            if exitcodes.get("core") == 1 or exitcodes.get("bot") == 1:
                print(
                    "[ERROR] pip-audit step failed but vulnerability records are empty. "
                    "Resolver or runtime failure 가능성이 있으므로 보수적으로 실패 처리합니다."
                )
                sys.exit(2)
            print("[PASS] pip-audit: no known vulnerabilities found in core/bot requirements.")
            sys.exit(0)

        # 예외 목록은 별도 출력해서 운영자가 "무엇을 임시 허용 중인지"를 즉시 인지하도록 한다.
        if ignored_issues:
            print(f"[WARN] pip-audit ignored {len(ignored_issues)} vulnerability records via allowlist:")
            for label, name, version, vuln_id, fixes in ignored_issues:
                print(f"- [ignored/{label}] {name}=={version} | {vuln_id} | fixed: {fixes}")

        if not blocking_issues:
            print("[PASS] pip-audit: only allowlisted vulnerabilities found.")
            sys.exit(0)

        # allowlist에 없는 취약점이 하나라도 있으면 job을 실패시켜 보안 게이트를 유지한다.
        print(f"[FAIL] pip-audit found {len(blocking_issues)} blocking vulnerability records:")
        for label, name, version, vuln_id, fixes in blocking_issues:
            print(f"- [{label}] {name}=={version} | {vuln_id} | fixed: {fixes}")
        sys.exit(1)
        PY

    - name: Upload pip-audit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pip-audit-report
        if-no-files-found: warn
        path: |
          pip-audit-report-core.json
          pip-audit-report-bot.json
